server:
  port: 8083

spring:
  application:
    name: rating-service
  
  # PostgreSQL Configuration
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/streamflix_db}
    username: streamflix_user
    password: streamflix_pass
    driver-class-name: org.postgresql.Driver
  
  # JPA / Hibernate settings to auto-create your tables during development
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # Kafka Configuration
  kafka:
    template:
      observation-enabled: true
    bootstrap-servers: ${KAFKA_URL:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer    

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: "*"  # Opens all actuator endpoints (health, metrics, etc.)
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}