server:
  port: 8084

spring:
  application:
    name: analytics-service
  kafka:
    # Use environment variable for Docker, fallback to localhost for IDE
    bootstrap-servers: ${KAFKA_URL:localhost:9094}
    consumer:
      group-id: analytics-group
      # If the service boots up late, read all missed messages from the beginning
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: manual_immediate
      observation-enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379      

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: "*"  # Opens all actuator endpoints (health, metrics, etc.)
  metrics:
    tags:
      application: ${spring.application.name}
  otlp:
    metrics:
      export:
        enabled: false   # Prometheus scrapes /actuator/prometheus; don't push metrics via OTLP
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
    logging:
      export:
        otlp:
          endpoint: ${OTLP_LOGS_ENDPOINT:http://localhost:4318/v1/logs}

logging:
  pattern:
    correlation: "[${spring.application.name},%X{trace_id:-},%X{span_id:-}] "
