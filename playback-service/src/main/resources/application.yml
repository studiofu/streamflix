server:
  port: 8086

spring:
  application:
    name: playback-service

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/streamflix_db}
    username: streamflix_user
    password: streamflix_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${spring.application.name}
  otlp:
    metrics:
      export:
        enabled: false   # Prometheus scrapes /actuator/prometheus; don't push metrics via OTLP
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
    logging:
      export:
        otlp:
          endpoint: ${OTLP_LOGS_ENDPOINT:http://localhost:4318/v1/logs}

logging:
  pattern:
    correlation: "[${spring.application.name},%X{trace_id:-},%X{span_id:-}] "
