apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports: [{ containerPort: 3000, name: http }]
          env:
            - { name: GF_PATHS_PROVISIONING, value: /etc/grafana/provisioning }
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef: { name: streamflix-secrets, key: GRAFANA_ADMIN_USER }
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: streamflix-secrets, key: GRAFANA_ADMIN_PASSWORD }
          volumeMounts:
            - { name: data, mountPath: /var/lib/grafana }
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources, readOnly: true }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: 128Mi, cpu: 100m }
            limits: { memory: 512Mi, cpu: 500m }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: grafana-pvc }
        - name: datasources
          projected:
            sources:
              - configMap:
                  name: grafana-datasources
                  items: [{ key: datasources.yaml, path: datasources.yaml }]
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  selector: { app: grafana }
  ports:
    - { port: 3000, targetPort: 3000, name: http }
