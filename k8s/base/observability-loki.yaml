apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
spec:
  replicas: 1
  selector:
    matchLabels: { app: loki }
  template:
    metadata:
      labels: { app: loki }
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.2.1
          args: ["-config.file=/etc/loki/loki-config.yaml"]
          ports: [{ containerPort: 3100, name: http }, { containerPort: 9096, name: grpc }]
          volumeMounts:
            - { name: config, mountPath: /etc/loki, readOnly: true }
            - { name: data, mountPath: /loki }
          readinessProbe:
            tcpSocket: { port: 3100 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: 256Mi, cpu: 100m }
            limits: { memory: 1Gi, cpu: 1000m }
      volumes:
        - name: config
          configMap:
            name: loki-file
            items:
              - { key: loki-config.yaml, path: loki-config.yaml }
        - name: data
          persistentVolumeClaim: { claimName: loki-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: loki
spec:
  selector: { app: loki }
  ports:
    - { port: 3100, targetPort: 3100, name: http }
    - { port: 9096, targetPort: 9096, name: grpc }
