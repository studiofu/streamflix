# Replace default passwords before production. Apply after editing:
#   kubectl create secret generic streamflix-secrets --from-literal=... --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: streamflix-secrets
  labels:
    app.kubernetes.io/part-of: streamflix
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_USER: streamflix_user
  POSTGRES_PASSWORD: streamflix_pass
  POSTGRES_DB: streamflix_db
  # Must match user-service + federation-gateway
  JWT_SECRET: super-secret-streamflix-key
  # Grafana admin
  GRAFANA_ADMIN_USER: admin
  GRAFANA_ADMIN_PASSWORD: admin
