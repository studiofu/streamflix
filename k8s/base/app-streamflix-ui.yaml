# The UI image must be built with a public GraphQL URL for the browser, e.g.:
#   docker build -t streamflix/streamflix-ui:latest --build-arg VITE_GRAPHQL_URI=https://api.streamflix.local/ streamflix-ui
# (match your Ingress host for the gateway). Default localhost:4000 only works for port-forwards, not in-cluster browsers.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamflix-ui
spec:
  replicas: 1
  selector:
    matchLabels: { app: streamflix-ui }
  template:
    metadata:
      labels: { app: streamflix-ui }
    spec:
      containers:
        - name: ui
          image: streamflix/streamflix-ui
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80, name: http }]
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests: { memory: 32Mi, cpu: 25m }
            limits: { memory: 256Mi, cpu: 200m }
---
apiVersion: v1
kind: Service
metadata:
  name: streamflix-ui
spec:
  selector: { app: streamflix-ui }
  ports:
    - { port: 80, targetPort: 80, name: http }
