# docker-compose.yml
services:
  # 1. PostgreSQL (For User & Rating Services)
  postgres:
    image: postgres:16-alpine
    container_name: streamflix-postgres
    environment:
      POSTGRES_USER: streamflix_user
      POSTGRES_PASSWORD: streamflix_pass
      POSTGRES_DB: streamflix_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamflix_user -d streamflix_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 2. MongoDB (For Catalog Service)
  mongodb:
    image: mongo:7.0
    container_name: streamflix-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 3. Redis (For caching and fast watch-state retrieval)
  redis:
    image: redis:7-alpine
    container_name: streamflix-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
  
  # ==========================================
  # REDIS UI (RedisInsight)
  # ==========================================
  redisinsight:
    image: redis/redisinsight:latest
    container_name: streamflix-redisinsight
    ports:
      - "8001:5540" # Maps port 8001 on your browser to the internal UI port
    depends_on:
      - redis      

  # 4. Apache Kafka (Official Image, KRaft Mode)
  kafka:
    image: apache/kafka:3.7.0
    container_name: streamflix-kafka
    ports:
      - "9094:9094" # Port for your local IDE to connect
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'StreamFlixCluster12345'
      # Persist broker logs + KRaft metadata (default image path is often under /tmp)
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

  # 5. Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: streamflix-kafka-ui
    ports:
      - "8090:8080" # Available at localhost:8090
    environment:
      - KAFKA_CLUSTERS_0_NAME=StreamFlix-Cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: streamflix-zipkin
    ports:
      - "9411:9411"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.143.1
    container_name: streamflix-otel-collector
    command: ["--config=/etc/otel-collector/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - zipkin

  # ==========================================
  # METRICS & DASHBOARDS
  # ==========================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: streamflix-cadvisor
    ports:
      - "8099:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true

  prometheus:
    image: prom/prometheus:latest
    container_name: streamflix-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - cadvisor

  # Grafana
  # Sample JVM Dashboard is 4701, and you need to add DS_PROMETHEUS
  # as datasource and connect to the prometheus server.
  grafana:
    image: grafana/grafana:latest
    container_name: streamflix-grafana
    ports:
      - "3005:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mongo_data:
  kafka_data:
  grafana_data: